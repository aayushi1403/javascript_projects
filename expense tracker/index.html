<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker | Style Web Code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css" 
  integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg==" 
  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Expense Tracker</h1>
  <div class="container">
    <div class="header">
      <img src="https://i.ibb.co/jfScDTC/budget.png" alt="Expense Tracker" />
      <div class="balance-container">
        <h2>Your Balance</h2>
        <h2 id="balance" class="balance">$0.00</h2>
      </div>
    </div>
    <div class="inc-exp-container">
      <div>
        <h4>Income</h4>
        <p id="money-plus" class="money plus">+$0.00</p>
      </div>
      <div>
        <h4>Expenses</h4>
        <p id="money-minus" class="money minus">-$0.00</p>
      </div>
    </div>
    <h3>History</h3>
    <ul id="list" class="list">
      <li class="minus">Flower<span>-20</span>
        <button class="delete-btn"><i class="fa fa-times"></i></button>
      </li>
      <li class="plus">Salary<span>+300</span>
        <button class="delete-btn"><i class="fa fa-times"></i></button>
      </li>
      <li class="minus">Book<span>-10</span>
        <button class="delete-btn"><i class="fa fa-times"></i></button>
      </li>
      <li class="plus">Camera<span>+150</span>
        <button class="delete-btn"><i class="fa fa-times"></i></button>
      </li>
    </ul>
    <h3>Add new transaction</h3>
    <form id="form">
      <div class="form-control">
        <label for="text">Description</label>
        <input type="text" id="text" placeholder="Enter description..." />
      </div>
      <div class="form-control">
        <label for="amount">Amount <br />
          <small>(-100 = expense, 100 = income)</small></label>
        <input type="number" id="amount" placeholder="Enter amount..." />
      </div>
      <button class="btn">Add transaction</button>
    </form>
  </div>
  <!-- Notification -->
  <div class="notification-container" id="notification">
    <p>Please add a description and amount</p>
  </div>
</body>

</html>
